name: Sincronizar inventario DOA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sync-doa.yml'
      - 'scripts/sync-doa.mjs'
  schedule:
    - cron: '17 6 * * 1'
      timezone: 'America/Panama'

permissions:
  contents: write

concurrency:
  group: inventory-lens-doa-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Abrir repositorio
        uses: actions/checkout@v6

      - name: Preparar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Instalar lector XLSX
        run: npm install --no-save --ignore-scripts xlsx@0.18.5

      - name: Descargar y sanitizar Excel DOA
        env:
          ONEDRIVE_DOA_URL: ${{ secrets.ONEDRIVE_DOA_URL }}
        run: node scripts/sync-doa.mjs

      - name: Publicar cambios
        run: |
          if git diff --quiet -- doa-data.json; then
            echo "El contenido DOA no cambió."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add doa-data.json
          git commit -m "Actualizar datos DOA"
          git push
